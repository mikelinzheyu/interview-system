# AI面试系统 - 完整生产环境 Docker Compose 配置
# ================================================
# 使用此文件部署到生产环境
# 命令: docker compose -f docker-compose.prod.yml up -d

services:
  # ============================================
  # PostgreSQL 数据库服务 (生产环境推荐)
  # ============================================
  db:
    image: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com/ai_interview/postgres:15-alpine
    container_name: interview-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-interview_system}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123!}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./logs/db:/var/log/postgresql
    networks:
      - interview-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 缓存服务 (已优化)
  # ============================================
  redis:
    image: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com/ai_interview/redis:7-alpine
    container_name: interview-redis
    restart: always
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - interview-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Node.js 后端API服务 - 使用预构建镜像
  # ============================================
  backend:
    image: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com/ai_interview/ai_interview_backend:latest
    container_name: interview-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      TZ: ${TZ:-Asia/Shanghai}
      # 数据库配置 (PostgreSQL)
      DB_HOST: interview-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-interview_system}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-SecurePassword123!}
      # ⚠️ 关键: Dify AI 三个工作流的 API 密钥 (后端代码期望这些变量名)
      DIFY_API_BASE_URL: ${DIFY_API_BASE_URL:-https://api.dify.ai/v1}
      DIFY_INTERVIEW_INIT_KEY: ${DIFY_INTERVIEW_INIT_KEY}
      DIFY_INTERVIEW_CHAT_KEY: ${DIFY_INTERVIEW_CHAT_KEY}
      DIFY_INTERVIEW_VERDICT_KEY: ${DIFY_INTERVIEW_VERDICT_KEY}
      # Redis 配置
      REDIS_HOST: interview-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-RedisPassword123!}
      REDIS_DB: 0
      # JWT 和其他配置
      JWT_SECRET: ${JWT_SECRET:-interview-system-jwt-secret-key}
    expose:
      - "3001"
    networks:
      - interview-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Vue 前端服务 - 使用预构建镜像
  # ============================================
  frontend:
    image: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com/ai_interview/ai_interview_frontend:latest
    container_name: interview-frontend
    restart: on-failure
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api
    expose:
      - "80"
    networks:
      - interview-network

  # ============================================
  # Nginx 反向代理和路由
  # ============================================
  nginx-proxy:
    image: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com/ai_interview/nginx:1.27-alpine
    container_name: interview-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 使用相对路径，确保与 docker-compose.prod.yml 同目录
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - interview-network
    depends_on:
      - frontend
      - backend
    # 添加健康检查，确保 nginx 正常启动
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

networks:
  interview-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  nginx_cache:
