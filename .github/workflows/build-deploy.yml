name: CI/CD - Build & Deploy to Aliyun

# 触发条件：每次推送到main分支时触发
on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

env:
  # 阿里云容器仓库配置
  REGISTRY: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: ai_interview
  IMAGE_FRONTEND: ai_interview_frontend
  IMAGE_BACKEND: ai_interview_backend

jobs:
  # ============================================
  # Job 1: 构建并推送镜像到阿里云仓库
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build Summary
        run: |
          echo "✅ 镜像构建和推送成功！"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}"

  # ============================================
  # Job 2: 部署到生产服务器
  # ============================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Production Server
        run: |
          # 检查所有必需的 Secrets
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "❌ 错误：DEPLOY_HOST Secret 未配置"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "❌ 错误：DEPLOY_USER Secret 未配置"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_PRIVATE_KEY }}" ]; then
            echo "❌ 错误：DEPLOY_PRIVATE_KEY Secret 未配置"
            exit 1
          fi

          # 设置 SSH 端口，如果未指定则使用默认值 22
          PORT=${{ secrets.DEPLOY_PORT }}
          PORT=${PORT:-22}

          echo "正在连接到: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$PORT"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p $PORT ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
          set -e

          echo "========== 开始部署 =========="

          # 确保部署目录存在
          mkdir -p ${{ secrets.DEPLOY_PATH }}
          cd ${{ secrets.DEPLOY_PATH }}

          # ===== 从 GitHub 同步最新配置文件（关键步骤）=====
          echo "正在从 GitHub 同步配置文件..."

          # 如果存在上次克隆失败残留的空 .git 目录，先清理掉
          if [ -d .git ] && [ -z "$(git status --porcelain 2>/dev/null)" ]; then
            rm -rf .git
          fi

          if [ ! -d .git ]; then
            echo "首次部署，使用加速镜像克隆仓库..."
            # 使用 ghproxy 加速节点
            git clone https://ghproxy.cn/https://github.com/mikelinzheyu/interview-system.git .
          else
            echo "后续部署，拉取最新更新..."
            # 确保后续拉取也使用加速节点
            git remote set-url origin https://ghproxy.cn/https://github.com/mikelinzheyu/interview-system.git
            git fetch origin
            git reset --hard origin/main
          fi
          echo "✅ 配置文件同步完成"

          # 登录阿里云
          docker login -u ${{ secrets.ALIYUN_REGISTRY_USERNAME }} -p ${{ secrets.ALIYUN_REGISTRY_PASSWORD }} ${{ env.REGISTRY }}

          # 拉取最新镜像
          echo "正在拉取最新镜像..."
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest

          # 停止旧容器并清理孤立容器
          echo "正在停止旧容器并清理孤立容器..."
          docker-compose -f docker-compose.prod.yml down --remove-orphans || true

          # 启动新容器
          echo "正在启动新容器..."
          docker-compose -f docker-compose.prod.yml up -d

          # 等待服务启动
          sleep 30

          # 检查容器状态
          echo "容器状态："
          docker-compose -f docker-compose.prod.yml ps

          echo "========== 部署完成 =========="
          EOF

      - name: Verify Deployment
        run: |
          echo "等待应用启动..."
          sleep 10

          # 检查应用是否可访问
          if curl -f https://viewself.cn/ 2>/dev/null; then
            echo "✅ 应用主页可访问"
          else
            echo "⚠️  应用主页暂未就绪，但可能还在初始化中"
          fi

          if curl -f https://viewself.cn/api/health 2>/dev/null; then
            echo "✅ API健康检查通过"
          else
            echo "⚠️  API暂未就绪"
          fi

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 部署成功！"
            echo "应用地址: https://viewself.cn"
            echo "Grafana: https://viewself.cn:3000"
          else
            echo "❌ 部署失败，请检查日志"
          fi
