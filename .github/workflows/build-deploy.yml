name: CI/CD - Build & Deploy to Aliyun

# 触发条件：每次推送到main分支时触发
on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

env:
  # 阿里云容器仓库配置
  REGISTRY: crpi-ez54q3vldx3th6xj.cn-hongkong.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: ai_interview
  IMAGE_FRONTEND: ai_interview_frontend
  IMAGE_BACKEND: ai_interview_backend

jobs:
  # ============================================
  # Job 1: 构建并推送镜像到阿里云仓库
  # ============================================
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build Summary
        run: |
          echo "✅ 镜像构建和推送成功！"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}"

  # ============================================
  # Job 2: 部署到生产服务器
  # ============================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload deployment files to server
        run: |
          # 检查所有必需的 Secrets
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "❌ 错误：DEPLOY_HOST Secret 未配置"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "❌ 错误：DEPLOY_USER Secret 未配置"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_PRIVATE_KEY }}" ]; then
            echo "❌ 错误：DEPLOY_PRIVATE_KEY Secret 未配置"
            exit 1
          fi

          # 设置 SSH 端口，如果未指定则使用默认值 22
          PORT=${{ secrets.DEPLOY_PORT }}
          PORT=${PORT:-22}

          echo "📦 正在上传部署文件到服务器..."

          # 上传 docker-compose.prod.yml
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/id_rsa -P $PORT \
            docker-compose.prod.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

          # 上传 nginx 配置（如果存在）
          if [ -d "nginx" ]; then
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/id_rsa -P $PORT -r \
              nginx ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
          fi

          # 上传 scripts（如果存在）
          if [ -d "scripts" ]; then
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/id_rsa -P $PORT -r \
              scripts ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/
          fi

          echo "✅ 部署文件上传完成"

      - name: Deploy to Production Server
        run: |
          # 设置 SSH 端口，如果未指定则使用默认值 22
          PORT=${{ secrets.DEPLOY_PORT }}
          PORT=${PORT:-22}

          echo "正在连接到: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$PORT"

          # 使用增强的 SSH 参数，防止长连接超时
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=6 \
              -i ~/.ssh/id_rsa -p $PORT ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
          set -e

          echo "========== 开始部署 =========="

          # 确保部署目录存在
          mkdir -p ${{ secrets.DEPLOY_PATH }}
          cd ${{ secrets.DEPLOY_PATH }}

          echo "✅ 配置文件已从 GitHub Actions 上传完成"

          echo "检查 Docker 环境..."
          docker --version
          docker compose version

          # 登录阿里云（使用安全的 password-stdin 方式）
          echo "正在登录阿里云仓库..."
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login -u ${{ secrets.ALIYUN_REGISTRY_USERNAME }} --password-stdin ${{ env.REGISTRY }}

          # 拉取最新镜像
          echo "正在拉取最新镜像..."
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest
          docker pull ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest

          # 停止旧容器并清理孤立容器
          echo "正在停止旧容器并清理孤立容器..."
          docker compose -f docker-compose.prod.yml down --remove-orphans || true

          # 启动新容器
          echo "正在启动新容器..."
          docker compose -f docker-compose.prod.yml up -d

          # 等待服务启动
          sleep 30

          # 检查容器状态
          echo "容器状态："
          docker compose -f docker-compose.prod.yml ps

          echo "========== 部署完成 =========="
          EOF

      - name: Verify Deployment
        run: |
          echo "等待应用启动..."
          sleep 10

          # 检查应用是否可访问
          if curl -f https://viewself.cn/ 2>/dev/null; then
            echo "✅ 应用主页可访问"
          else
            echo "⚠️  应用主页暂未就绪，但可能还在初始化中"
          fi

          if curl -f https://viewself.cn/api/health 2>/dev/null; then
            echo "✅ API健康检查通过"
          else
            echo "⚠️  API暂未就绪"
          fi

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 部署成功！"
            echo "应用地址: https://viewself.cn"
            echo "Grafana: https://viewself.cn:3000"
          else
            echo "❌ 部署失败，请检查日志"
          fi
